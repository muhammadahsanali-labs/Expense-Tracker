<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | PKR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <h2>Expense Tracker</h2>
            <h4>Your Balance</h4>
            <h1 id="balance">Rs. 0.00</h1>
            
            <div class="inc-exp-container">
                <div>
                    <h4>Income</h4>
                    <p id="money-plus" class="money-plus">+Rs. 0.00</p>
                </div>
                <div>
                    <h4>Expense</h4>
                    <p id="money-minus" class="money-minus">-Rs. 0.00</p>
                </div>
            </div>

            <h3>History <button onclick="clearAll()" class="clear-btn">Clear All</button></h3>
            <ul id="list" class="list"></ul>

            <h3>Add New Transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Description</label>
                    <input type="text" id="text" placeholder="e.g., Salary, Food" required/>
                </div>
                <div class="form-control">
                    <label for="amount">Amount (Negative for expense)</label>
                    <input type="number" id="amount" placeholder="Enter amount" required> 
                </div>
                <button class="btn">Add Transaction</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
